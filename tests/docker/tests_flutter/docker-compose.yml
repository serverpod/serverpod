services:
  serverpod_test_server:
    build:
      context: ../../..
      dockerfile: tests/docker/tests_flutter/Dockerfile-server
    environment:
      SERVERPOD_SILENCE_LIFECYCLE_MESSAGES: '1'
      # This stack provides its own postgres + redis services; the run-mode
      # configs default to embedded postgres (an empty dataPath opts out)
      # and carry no redis.
      SERVERPOD_DATABASE_DATA_PATH: ''
      SERVERPOD_REDIS_ENABLED: 'true'
      SERVERPOD_REDIS_HOST: 'redis'
      SERVERPOD_REDIS_PORT: '6379'
    depends_on:
      - 'postgres'
      - 'redis'
  tests:
    build:
      context: ../../..
      dockerfile: tests/docker/tests_flutter/Dockerfile-tests
    depends_on:
      - 'serverpod_test_server'
  postgres:
    build:
      context: ../../..
      dockerfile: tests/docker/Dockerfile.postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: serverpod_test
      POSTGRES_PASSWORD: password
  redis:
    image: redis:6.2.6
    command: redis-server --requirepass password
    environment:
      - REDIS_REPLICATION_MODE=master
