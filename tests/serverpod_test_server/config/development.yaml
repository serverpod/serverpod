apiServer:
  port: 8080
  publicHost: localhost
  publicPort: 8080
  publicScheme: http

insightsServer:
  port: 8081
  publicHost: localhost
  publicPort: 8081
  publicScheme: http

webServer:
  port: 8082
  publicHost: localhost
  publicPort: 8082
  publicScheme: http

database:
  # Use 127.0.0.1 so the VM client hits Docker-published ports on IPv4. Using
  # "localhost" can prefer ::1 where nothing is listening (connection refused).
  host: 127.0.0.1
  port: 8090
  name: serverpod_test
  user: postgres

redis:
  enabled: true
  host: 127.0.0.1
  port: 8091

sessionLogs:
  persistentEnabled: true
  consoleEnabled: true