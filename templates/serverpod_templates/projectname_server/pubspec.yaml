name: projectname_server
description: Starting point for a Serverpod server.
# version: 1.0.0
# homepage: https://www.example.com

environment:
  sdk: '^3.10.3'

#resolution: workspace #--UNCOMMENT_LINE--#

dependencies:
  serverpod: 3.5.0-beta.10

dev_dependencies:
  lints: '>=3.0.0 <7.0.0'
  serverpod_test: 3.5.0-beta.10
  test: ^1.25.5

serverpod:
  scripts:
    # Starts the server and applies migrations
    start: dart bin/main.dart --apply-migrations

    # Build the Flutter web app and copy it to the server's web directory.
    # Windows uses xcopy since flutter's --output flag doesn't work there.
    # See: https://github.com/flutter/flutter/issues/157886
    flutter_build:
      windows: >-
        (if exist web\app rmdir /S /Q web\app)
        & cd /D ..\projectname_flutter
        && flutter build web --base-href /app/
        && xcopy /E /I /Y build\web ..\projectname_server\web\app
      posix: |
        cd ../projectname_flutter
        flutter build web --base-href /app/ --output ../projectname_server/web/app

  # Companion Flutter apps that `serverpod start` can launch (Ctrl+R), keyed by
  # a display alias. When this section is omitted, a sibling Flutter package is
  # expected at `../projectname_flutter` and launched automatically.
  #
  # Per app: `auto_launch: true` starts it with the server; `device` sets the
  # `flutter run -d` target (defaults to the web server, opening a browser);
  # any other property is forwarded to `flutter run` (e.g.
  # `target: lib/main.dart` becomes `--target=lib/main.dart`).
  # flutter_apps:
  #   Admin:
  #     path: ../projectname_flutter
  #     auto_launch: true
  #     device: chrome
  #     target: lib/main.dart
