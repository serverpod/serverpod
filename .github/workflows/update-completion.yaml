name: Validate CLI Completion Specs

on:
  push:
    branches:
      - main
      - dev
      - stable-*
    paths:
      - "tools/serverpod_cli/lib/src/commands/**"
      - "tools/serverpod_cli/lib/src/runner/**"
      - "tools/serverpod_cli/bin/**"
  pull_request:
    branches:
      - main
      - dev
      - stable-*
    paths:
      - "tools/serverpod_cli/lib/src/commands/**"
      - "tools/serverpod_cli/lib/src/runner/**"
      - "tools/serverpod_cli/bin/**"

jobs:
  validate-completion:
    name: Validate completion specs
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flutter-version: ["3.38.4", "3.41.5"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ matrix.flutter-version }}
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Generate completion specs
        run: util/generate_completion

      - name: Verify no changes
        run: |
          echo "### If this fails, run util/generate_completion and commit the result"
          util/ensure_no_changes
