        working-directory: integrations/serverpod_cloud_storage_gcp
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
      - run: dart pub get
      - run: dart test test/integration/native_gcp_integration_test.dart --reporter=failures-only

  email_integration_tests:
    name: Transactional Email Integration Tests
    runs-on: ubuntu-latest
    # No `if` gate: the negative paths (400/401) run on every push and need no
    # credentials. The happy-path tests self-skip when the secrets below are
    # absent (an unset secret resolves to an empty string, treated as missing).
    env:
      SERVERPOD_TEST_SCLOUD_EMAIL_KEY: ${{ secrets.SERVERPOD_TEST_SCLOUD_EMAIL_KEY }}
      SERVERPOD_TEST_SCLOUD_EMAIL_RECIPIENT: ${{ secrets.SERVERPOD_TEST_SCLOUD_EMAIL_RECIPIENT }}
      SERVERPOD_TEST_SCLOUD_EMAIL_BASE_URL: ${{ secrets.SERVERPOD_TEST_SCLOUD_EMAIL_BASE_URL }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: "3.38.4"
          cache: false
      - name: Install melos
        run: dart pub global activate melos
      - name: Bootstrap
        run: melos bootstrap
      - name: Run transactional email integration tests
        run: dart test test/integration/serverpod_cloud_email_integration_test.dart --reporter=failures-only
        working-directory: modules/serverpod_auth/serverpod_auth_idp/serverpod_auth_idp_server

  publish_check:
    name: Publish check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: "3.38.4"
          cache: false
      - name: Install melos
        run: dart pub global activate melos
      - name: Run publish check
        continue-on-error: true
        id: run_publish
        shell: bash
        run: melos publish --dry-run --yes 2>&1 | tee publish_output.txt
      - name: Highlight publish errors
        shell: bash
        run: |
          if [ -f publish_output.txt ]; then
            # Print lines that begin with "ERROR: " to make them stand out in logs
            # Because the publish --dry-run does not support ignoring warnings,
            # we fail the step if any ERROR lines are found.
            if grep -nE '^ERROR: ' publish_output.txt >/dev/null; then
              echo "Packages with errors (lines from melos output):"
              grep -nE '^ERROR: ' publish_output.txt || true
              exit 1
            else
              echo "No ERROR lines found in melos output."
            fi
          else
            echo "publish_output.txt not found."
            exit 1
          fi
