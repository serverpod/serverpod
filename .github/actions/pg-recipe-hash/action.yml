name: Compute embedded PG recipe hash
description: >-
  Hash of the embedded PostgreSQL build recipe and source tree

outputs:
  hash:
    description: SHA-256 hash of fileset
    value: ${{ steps.hash.outputs.hash }}

runs:
  using: composite
  steps:
    # Covers everything that determines the built bytes: the build scripts +
    # canonical versions.env (tool/build_postgres/**), the Dart-side bundle
    # spec, options.dart (default PG version), and the toolchain setup action.
    # Post-build checks (smoke scripts) are deliberately excluded - they gate
    # publication but do not alter the bundle.
    - id: hash
      shell: bash
      run: |
        h="${{ hashFiles('packages/serverpod_embedded_postgres/lib/src/options.dart', 'packages/serverpod_embedded_postgres/lib/src/binary/bundle_spec.dart', 'packages/serverpod_embedded_postgres/tool/build_postgres/**', '.github/actions/setup-pg-build-toolchain/action.yml') }}"
        if [ -z "$h" ]; then
          echo "::error::recipe hash is empty - fileset moved? A degenerate hash would let stale bundles match."
          exit 1
        fi
        echo "hash=$h" >> "$GITHUB_OUTPUT"
