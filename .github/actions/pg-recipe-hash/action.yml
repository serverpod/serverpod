name: Compute embedded PG recipe hash
description: >-
  Hash of the embedded PostgreSQL build recipe and source tree

outputs:
  hash:
    description: SHA-256 hash of fileset
    value: ${{ steps.hash.outputs.hash }}

runs:
  using: composite
  steps:
    # Covers everything that determines the built bytes: the build scripts +
    # canonical versions.env (tool/build_postgres/**, excluding its README)
    # and the toolchain setup action. The bundle-spec test separately rejects
    # drift in the Dart-side mapping/default. Runtime files, documentation,
    # and post-build smoke checks are deliberately excluded because they do
    # not alter bundle bytes.
    - id: hash
      shell: bash
      run: |
        h="${{ hashFiles('packages/serverpod_embedded_postgres/tool/build_postgres/**', '!packages/serverpod_embedded_postgres/tool/build_postgres/README.md', '.github/actions/setup-pg-build-toolchain/action.yml') }}"
        if [ -z "$h" ]; then
          echo "::error::recipe hash is empty - fileset moved? A degenerate hash would let stale bundles match."
          exit 1
        fi
        echo "hash=$h" >> "$GITHUB_OUTPUT"
