name: Use Redis
description: Installs and starts Redis with retries for transient APT failures.

inputs:
  password:
    description: The password required by the Redis test server.
    required: true

runs:
  using: composite
  steps:
    - name: Install Redis
      uses: ./.github/actions/retry
      with:
        timeout_seconds: "150"
        command: |
          sudo timeout --kill-after=10s 60s \
              apt-get \
              -o Acquire::Retries=2 \
              -o Acquire::http::Timeout=20 \
              -o Acquire::https::Timeout=20 \
              update &&
          sudo timeout --kill-after=10s 60s \
              env DEBIAN_FRONTEND=noninteractive \
              apt-get \
              -o Acquire::Retries=2 \
              -o Acquire::http::Timeout=20 \
              -o Acquire::https::Timeout=20 \
              -o DPkg::Lock::Timeout=10 \
              install -y redis-server

    - name: Start Redis
      shell: bash
      env:
        REDIS_PASSWORD: ${{ inputs.password }}
      run: |
        # serverpod_test_server's config uses redis host 'redis'.
        echo "127.0.0.1 redis" | sudo tee -a /etc/hosts

        # APT auto-starts a password-less Redis. Replace it with the
        # password-protected test instance.
        sudo systemctl stop redis-server 2>/dev/null || true
        redis-server --daemonize yes --requirepass "$REDIS_PASSWORD"

    - name: Wait for Redis
      uses: ./.github/actions/retry
      env:
        REDIS_PASSWORD: ${{ inputs.password }}
      with:
        attempts: "10"
        backoff: fixed
        timeout_seconds: "5"
        command: REDISCLI_AUTH="$REDIS_PASSWORD" redis-cli ping | grep -q '^PONG$'
