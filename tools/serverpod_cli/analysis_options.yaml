include: package:serverpod_lints/cli.yaml
analyzer:
  exclude:
    - test/integration/util/test_assets/pubspec_helpers/conditionally_ignored/pubspec.yaml

linter:
  rules:
    # Temporary disable the following so that each can be fixed one by one.
    avoid_escaping_inner_quotes: false
    prefer_final_in_for_each: false
    prefer_final_locals: false
    prefer_final_parameters: false
    sort_pub_dependencies: false
    # ignore: undefined_lint
    strict_top_level_inference: false  # not defined in Dart 3.5
